      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
            colors: {
              indigo: { 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3' }

    <style>
      :root {
        --safe-area-top: env(safe-area-inset-top);
        --safe-area-bottom: env(safe-area-inset-bottom);
      }
      body { 
        height: 100%; 
        width: 100%; 
        overflow: hidden; 
        margin: 0; 
        overscroll-behavior: none; 
        background-color: #f8fafc;
        -webkit-font-smoothing: antialiased;
      }
      .dark body { background-color: #020617; }
      * { -webkit-tap-highlight-color: transparent; }
      .safe-pt { padding-top: var(--safe-area-top); }
      .safe-pb { padding-bottom: var(--safe-area-bottom); }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(79,70,229,0.1); border-radius: 10px; }
      #reader-core video { object-fit: cover !important; transform: translateZ(0); }
    </style>
