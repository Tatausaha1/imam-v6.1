    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.process = window.process || { env: { NEXT_PUBLIC_MOCK_AUTH: 'false' } };
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
            colors: {
              indigo: {
                50: '#f5f7ff',
                100: '#ebf0ff',
                200: '#ced9ff',
                300: '#a1bcff',
                400: '#6e91ff',
                500: '#4767ff',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
              }
            }
          }
        }
      };
    </script>
    <style>
      :root {
        --safe-area-top: env(safe-area-inset-top);
        --safe-area-bottom: env(safe-area-inset-bottom);
      }
      html, body { 
        height: 100%; 
        width: 100%; 
        overflow: hidden; 
        margin: 0; 
        padding: 0; 
        overscroll-behavior: none; 
        background-color: #f8fafc; 
        color: #0f172a; 
        -webkit-font-smoothing: antialiased;
      }
      .dark body { background-color: #020617; color: #f8fafc; }
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none !important; }
      .safe-pt { padding-top: var(--safe-area-top); }
      .safe-pb { padding-bottom: var(--safe-area-bottom); }
      
      /* Optimasi Scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(79, 70, 229, 0.1); border-radius: 20px; }
      .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); }
      
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      
      /* Hardware Acceleration untuk Animasi */
      .will-change-transform { will-change: transform; }
      
      /* Optimasi Rendering List Panjang */
      .content-visibility-auto { content-visibility: auto; }
    </style>
